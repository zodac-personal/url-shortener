networks:
  url-shortener:
    name: url-shortener
    driver: bridge

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    cap_drop:
      - ALL
    depends_on:
      cache:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
          pids: 256
    environment:
      CACHE_HOSTNAME: "cache"
      CACHE_PORT: "6379"
      LOG_LEVEL: "DEBUG"  # Set to DEBUG so we see log entries for cache hits/misses
    expose:
      - "8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - url-shortener
    restart: unless-stopped
    security_opt:
      - no-new-privileges=true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev

  cache:
    image: valkey/valkey:9.0.3-alpine  # https://hub.docker.com/r/valkey/valkey
    container_name: cache
    hostname: cache
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: "256M"
          pids: 128
    environment:
      VALKEY_EXTRA_FLAGS: "--save 60 1 --loglevel warning"
    expose:
      - "6379"
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 30s
      test: [ "CMD", "valkey-cli", "ping" ]
      timeout: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - url-shortener
    restart: unless-stopped
    security_opt:
      - no-new-privileges=true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    user: "999:1000"  # valkey user
    volumes:
      - cache_data:/data

  load-balancer:
    image: haproxy:3.3.9-alpine
    container_name: load-balancer
    hostname: load-balancer
    cap_drop:
      - ALL
    depends_on:
      backend:
        condition: service_healthy
      api-docs:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "256M"
          pids: 512
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 30s
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8404/health" ]
      timeout: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - url-shortener
    ports:
      - "8080:80"
    restart: unless-stopped
    security_opt:
      - no-new-privileges=true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    user: "99:99"  # haproxy user
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro

  api-docs:
    image: swaggerapi/swagger-ui:v5.32.5
    container_name: api-docs
    hostname: api-docs
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: "256M"
          pids: 128
    environment:
      SWAGGER_JSON: /spec/openapi.yaml
    expose:
      - "8080"
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 30s
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/" ]
      timeout: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - url-shortener
    restart: unless-stopped
    security_opt:
      - no-new-privileges=true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    user: "1000:1000"
    volumes:
      - ./openapi.yaml:/spec/openapi.yaml
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro

volumes:
  cache_data: { }
